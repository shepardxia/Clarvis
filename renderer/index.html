<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #ascii-view {
      font-family: monospace;
      font-size: 12px;
      line-height: 12px;
      color: #fff;
      white-space: pre;
      opacity: 1;
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
    }
    #pixel-view {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <pre id="ascii-view"></pre>
  <canvas id="pixel-view"></canvas>

  <script src="sprites.js"></script>
  <script>
    // ===========================================
    // RENDER MODE: 'ascii' or 'pixel'
    // ===========================================
    const RENDER_MODE = 'ascii';
    // ===========================================

    const asciiView = document.getElementById('ascii-view');
    const pixelView = document.getElementById('pixel-view');

    if (RENDER_MODE === 'ascii') {
      pixelView.classList.add('hidden');
      asciiView.textContent = ASCII.trim();
    } else {
      asciiView.classList.add('hidden');
      const ctx = pixelView.getContext('2d');
      const px = 4;
      const height = SPRITE.length;
      const width = Math.max(...SPRITE.map(row => row.length));
      pixelView.width = width * px;
      pixelView.height = height * px;

      for (let y = 0; y < SPRITE.length; y++) {
        for (let x = 0; x < SPRITE[y].length; x++) {
          const color = SPRITE[y][x];
          if (color && color !== '0, 0, 0, 0') {
            const [r, g, b, a] = color.split(',').map(s => parseInt(s.trim()));
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${(a || 255) / 255})`;
            ctx.fillRect(x * px, y * px, px, px);
          }
        }
      }
    }

    // For Swift bridge (no-op for now)
    window.setState = function(state, tool) {};
  </script>
</body>
</html>
